<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOAP Search — Tags Manager</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="main-content">
  <div class="content-center">

    <div class="page-header">
      <div>
        <h1 class="page-title">SOAP Search</h1>
        <p class="page-subtitle">Search tags via the SOAP web service</p>
      </div>
    </div>

    <div id="alert-container" class="mb-4"></div>

    <div class="card card-body" style="margin-bottom:1.5rem">
      <div class="flex gap-3 ai-c">
        <div class="input-wrap w-full">
          <span class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input type="search" id="search-input" class="input input-pad-icon"
                 placeholder="Search term">
        </div>
        <button id="search-btn" class="btn btn-primary" style="flex-shrink:0;min-width:100px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Search
        </button>
      </div>
    </div>

    <div id="soap-results" class="hidden"></div>


  </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/soap.js"></script>
</body>
</html>

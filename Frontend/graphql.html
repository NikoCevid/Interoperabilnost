<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GraphQL — Tags Manager</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .gql-textarea {
      width: 100%;
      min-height: 200px;
      font-family: 'Cascadia Code', 'Fira Mono', 'Courier New', monospace;
      font-size: 0.8125rem;
      line-height: 1.7;
      background: #1e1e2e;
      color: #cdd6f4;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 0.875rem 1rem;
      resize: vertical;
      box-sizing: border-box;
      tab-size: 2;
    }
    .gql-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    }
    .preset-btn {
      display: inline-flex;
      align-items: center;
      padding: .25rem .7rem;
      border-radius: var(--r-full);
      font-size: .75rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      background: #374151;
      color: #d1d5db;
      white-space: nowrap;
      transition: background .12s, color .12s;
      line-height: 1.6;
    }
    .preset-btn:hover { background: #4b5563; color: #f9fafb; }
    .preset-btn.active { background: var(--primary); color: #fff; }
    .response-pre {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: var(--r-md);
      padding: 1rem;
      font-family: 'Cascadia Code', 'Fira Mono', 'Courier New', monospace;
      font-size: 0.775rem;
      line-height: 1.7;
      min-height: 180px;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-x: auto;
      margin: 0;
    }
    .response-pre.has-errors { color: #f87171; }
    .response-status-ok   { color: var(--green); }
    .response-status-err  { color: var(--red, #f87171); }
  </style>
</head>
<body>
  <main class="main-content">
  <div class="content-wide">

    <div class="page-header">
      <div>
        <h1 class="page-title">GraphQL</h1>
        <p class="page-subtitle">Query and mutate tags via the GraphQL endpoint</p>
      </div>
      <div id="mode-badge"></div>
    </div>

    <div id="gql-alert" class="mb-4"></div>

    <div style="display:flex;flex-direction:column;gap:1rem">

      <div class="card">
        <div class="card-header">
          <span class="card-title">GraphQL Query / Mutation</span>
        </div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:.875rem">
          <div>
            <label class="form-label mb-2" for="gql-query-textarea">Query or Mutation</label>
            <textarea id="gql-query-textarea" class="gql-textarea" spellcheck="false">query {
  tags(page: 1, pageSize: 10) {
    items {
      id
      name
      color
      description
      dateCreated
    }
    totalCount
  }
}</textarea>
          </div>
          <div style="display:flex;flex-wrap:wrap;align-items:center;gap:.4rem">
            <button id="gql-execute-btn" class="btn btn-primary btn-sm">Execute</button>
            <button class="preset-btn active" data-preset="list">List Tags</button>
            <button id="preset-get" class="preset-btn" data-preset="get">Get by ID</button>
            <button class="preset-btn" data-preset="search">Search Tags</button>
            <button id="preset-create" class="preset-btn" data-preset="create">Create Tag</button>
            <button id="preset-update" class="preset-btn" data-preset="update">Update Tag</button>
            <button id="preset-delete" class="preset-btn" data-preset="delete">Delete Tag</button>
          </div>

        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Response</span>
          <span id="gql-response-status" class="text-xs text-3"></span>
        </div>
        <div class="card-body">
          <pre id="gql-response" class="response-pre">// Click Execute to run the query…</pre>
        </div>
      </div>

    </div>

  </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/graphql.js"></script>
</body>
</html>

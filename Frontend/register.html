<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Tags Manager</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-brand-icon">
          <svg
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"
            />
            <line x1="7" y1="7" x2="7.01" y2="7" />
          </svg>
        </div>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-subtitle">Join Tags Manager today</p>
      </div>

      <div
        id="register-success"
        class="alert alert-success mb-4"
        style="display: none"
      >
        Account created! <a href="login.html">Sign in now</a>.
      </div>
      <div id="register-error" class="field-error mb-4"></div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input
            id="username"
            type="text"
            class="input"
            placeholder="Choose a username"
            autocomplete="username"
            autocapitalize="none"
          />
        </div>
        <div class="form-group mt-4">
          <label class="form-label" for="email">Email address</label>
          <input
            id="email"
            type="email"
            class="input"
            placeholder="you@example.com"
            autocomplete="email"
          />
        </div>
        <div class="form-group mt-4">
          <label class="form-label" for="password">Password</label>
          <input
            id="password"
            type="password"
            class="input"
            placeholder="Minimum 8 characters"
            autocomplete="new-password"
          />
        </div>
        <div class="form-group mt-4">
          <label class="form-label" for="role">Role</label>
          <select id="role" class="select">
            <option value="FullAccess">
              FullAccess — create, edit &amp; delete
            </option>
            <option value="ReadOnly">ReadOnly — view only</option>
          </select>
        </div>
        <div class="mt-5">
          <button type="submit" class="btn btn-primary btn-full btn-lg">
            Create account
          </button>
        </div>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>

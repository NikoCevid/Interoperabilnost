services:
  db:
    image: postgres:16-alpine
    container_name: tags_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tagsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tagsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: tags_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080;http://+:8081"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=tagsdb;Username=postgres;Password=postgres"
      Jwt__Secret: "YourSuperSecretJwtKey_MustBe32CharsOrMore!2024"
      Jwt__Issuer: "TagsApi"
      Jwt__Audience: "TagsApiClients"
      Jwt__AccessTokenExpiryMinutes: "180"
      Jwt__RefreshTokenExpiryDays: "7"
      ClickUp__ApiKey: "pk_296600606_3MBXORXF9V8YK21STYBOPBZ064Z6LD8S"
      ClickUp__SpaceId: "90127392597"
      UseExternalApi: "false"
      Grpc__WeatherServiceUrl: "http://backend:8081"
      TZ: "Europe/Zagreb"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: tags_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  default:
    name: tags_network

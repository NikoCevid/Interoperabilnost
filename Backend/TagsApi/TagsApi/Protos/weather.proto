syntax = "proto3";

option csharp_namespace = "TagsApi";

package weather;

service WeatherGrpc {
  rpc GetTemperature (WeatherRequest) returns (WeatherResponse);
}

message WeatherRequest {
  string city_name = 1;
}

message WeatherResponse {
  repeated WeatherEntry entries = 1;
  string error_message = 2;
}

message WeatherEntry {
  string city = 1;
  string temperature = 2;
  string humidity = 3;
  string wind = 4;
}
